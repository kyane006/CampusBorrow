name: Backend API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Grab the code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Run Server and Test
      env:
        MONGO_URI: ${{ secrets.MONGO_URI }}
      run: |
        node server.js & 
        sleep 5 
        node test-api.js